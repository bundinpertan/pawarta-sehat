<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PAWARTA SEHAT</title>
<meta name="description" content="Informasi Kesehatan Berbasis Cuaca — Kenali risiko penyakit musiman di sekitarmu">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f0f4f0;
    --surface: #ffffff;
    --surface2: #f7faf7;
    --border: #e0e8e0;
    --text: #1a2e1a;
    --text2: #4a6b4a;
    --text3: #7a9b7a;
    --accent: #2d7a3a;
    --accent-light: #e8f5eb;
    --accent2: #5cb870;
    --warn-low: #2d7a3a;
    --warn-med: #d97706;
    --warn-high: #dc2626;
    --warn-low-bg: #e8f5eb;
    --warn-med-bg: #fef3c7;
    --warn-high-bg: #fef2f2;
    --radius: 16px;
    --radius-sm: 10px;
    --shadow: 0 2px 16px rgba(45,122,58,0.08);
    --shadow-lg: 0 8px 32px rgba(45,122,58,0.12);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Plus Jakarta Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding-bottom: 2rem;
  }

  /* ── HEADER ── */
  header {
    background: linear-gradient(135deg, #1a4d24 0%, #2d7a3a 60%, #3d9e4f 100%);
    padding: 1.5rem 1.25rem 2rem;
    position: relative;
    overflow: hidden;
  }
  header::before {
    content: '';
    position: absolute;
    top: -40px; right: -40px;
    width: 180px; height: 180px;
    border-radius: 50%;
    background: rgba(255,255,255,0.05);
  }
  header::after {
    content: '';
    position: absolute;
    bottom: -20px; left: 30%;
    width: 120px; height: 120px;
    border-radius: 50%;
    background: rgba(255,255,255,0.04);
  }
  .header-top {
    display: flex;
    align-items: flex-start;
    gap: 0.75rem;
    position: relative; z-index: 1;
  }
  .logo-icon {
    width: 44px; height: 44px;
    background: rgba(255,255,255,0.15);
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.4rem;
    flex-shrink: 0;
    border: 1px solid rgba(255,255,255,0.2);
  }
  .header-text h1 {
    font-size: 1.3rem;
    font-weight: 800;
    color: #fff;
    letter-spacing: -0.02em;
    line-height: 1.2;
  }
  .header-text p {
    font-size: 0.72rem;
    color: rgba(255,255,255,0.7);
    font-style: italic;
    font-family: 'Instrument Serif', serif;
    margin-top: 2px;
  }

  /* ── LOCATION BAR ── */
  .location-bar {
    margin: 1rem 1.25rem 0;
    background: rgba(255,255,255,0.12);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 10px;
    padding: 0.6rem 0.9rem;
    display: flex;
    align-items: center;
    gap: 0.5rem;
    position: relative; z-index: 1;
  }
  .location-bar span {
    font-size: 0.78rem;
    color: rgba(255,255,255,0.9);
    flex: 1;
  }
  .btn-locate {
    background: rgba(255,255,255,0.2);
    border: 1px solid rgba(255,255,255,0.3);
    border-radius: 7px;
    color: #fff;
    font-size: 0.72rem;
    font-weight: 600;
    padding: 0.3rem 0.65rem;
    cursor: pointer;
    font-family: inherit;
    transition: background 0.2s;
  }
  .btn-locate:hover { background: rgba(255,255,255,0.3); }

  /* ── MAIN CONTENT ── */
  main { padding: 1.25rem; display: flex; flex-direction: column; gap: 1rem; }

  /* ── WEATHER CARD ── */
  .weather-card {
    background: var(--surface);
    border-radius: var(--radius);
    padding: 1.25rem;
    box-shadow: var(--shadow);
    border: 1px solid var(--border);
  }
  .weather-card-header {
    font-size: 0.7rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text3);
    margin-bottom: 0.85rem;
  }
  .weather-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 0.75rem;
  }
  .weather-param {
    background: var(--surface2);
    border-radius: var(--radius-sm);
    padding: 0.85rem 0.9rem;
    border: 1px solid var(--border);
  }
  .weather-param .param-label {
    font-size: 0.68rem;
    color: var(--text3);
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    display: flex;
    align-items: center;
    gap: 0.3rem;
    margin-bottom: 0.3rem;
  }
  .weather-param .param-value {
    font-size: 1.55rem;
    font-weight: 800;
    color: var(--text);
    line-height: 1;
  }
  .weather-param .param-value span {
    font-size: 0.8rem;
    font-weight: 500;
    color: var(--text3);
  }
  .weather-param .param-desc {
    font-size: 0.68rem;
    color: var(--text2);
    margin-top: 0.2rem;
  }

  /* weather condition wide */
  .weather-condition {
    grid-column: 1 / -1;
    display: flex;
    align-items: center;
    gap: 0.75rem;
  }
  .condition-icon { font-size: 2rem; }
  .condition-text .main { font-size: 1rem; font-weight: 700; color: var(--text); }
  .condition-text .sub { font-size: 0.72rem; color: var(--text3); }

  /* ── RISK SECTION ── */
  .section-title {
    font-size: 0.7rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text3);
    margin-bottom: 0.75rem;
    display: flex;
    align-items: center;
    gap: 0.4rem;
  }

  /* ── RISK LEVEL BANNER ── */
  .risk-banner {
    border-radius: var(--radius);
    padding: 1rem 1.25rem;
    display: flex;
    align-items: center;
    gap: 0.9rem;
    border: 1.5px solid;
  }
  .risk-banner.low  { background: var(--warn-low-bg);  border-color: #a7d7b0; }
  .risk-banner.med  { background: var(--warn-med-bg);  border-color: #fcd34d; }
  .risk-banner.high { background: var(--warn-high-bg); border-color: #fca5a5; }
  .risk-banner .risk-emoji { font-size: 1.8rem; flex-shrink: 0; }
  .risk-banner .risk-label {
    font-size: 0.68rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 0.15rem;
  }
  .risk-banner.low  .risk-label { color: var(--warn-low); }
  .risk-banner.med  .risk-label { color: var(--warn-med); }
  .risk-banner.high .risk-label { color: var(--warn-high); }
  .risk-banner .risk-desc { font-size: 0.8rem; color: var(--text); font-weight: 500; }

  /* ── DISEASE CARDS ── */
  .disease-list { display: flex; flex-direction: column; gap: 0.75rem; }
  .disease-card {
    background: var(--surface);
    border-radius: var(--radius-sm);
    border: 1px solid var(--border);
    overflow: hidden;
    box-shadow: var(--shadow);
  }
  .disease-card-header {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    padding: 0.9rem 1rem;
    cursor: pointer;
    user-select: none;
  }
  .disease-icon { font-size: 1.4rem; flex-shrink: 0; }
  .disease-name { font-size: 0.9rem; font-weight: 700; flex: 1; }
  .disease-risk-pill {
    font-size: 0.65rem;
    font-weight: 700;
    padding: 0.25rem 0.6rem;
    border-radius: 20px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }
  .pill-low  { background: var(--warn-low-bg);  color: var(--warn-low); }
  .pill-med  { background: var(--warn-med-bg);  color: var(--warn-med); }
  .pill-high { background: var(--warn-high-bg); color: var(--warn-high); }
  .disease-chevron {
    font-size: 0.7rem;
    color: var(--text3);
    transition: transform 0.2s;
  }
  .disease-card.open .disease-chevron { transform: rotate(180deg); }

  .disease-body {
    display: none;
    padding: 0 1rem 1rem;
    border-top: 1px solid var(--border);
  }
  .disease-card.open .disease-body { display: block; }

  .disease-trigger {
    font-size: 0.74rem;
    color: var(--text2);
    background: var(--surface2);
    border-radius: 8px;
    padding: 0.6rem 0.75rem;
    margin-top: 0.75rem;
    line-height: 1.5;
  }
  .disease-trigger strong { color: var(--text); }

  .prevention-list {
    margin-top: 0.7rem;
    display: flex;
    flex-direction: column;
    gap: 0.4rem;
  }
  .prevention-item {
    display: flex;
    gap: 0.5rem;
    align-items: flex-start;
    font-size: 0.78rem;
    color: var(--text);
    line-height: 1.45;
  }
  .prevention-item::before {
    content: '✓';
    color: var(--accent);
    font-weight: 700;
    flex-shrink: 0;
    margin-top: 0.05rem;
  }

  /* ── DISCLAIMER ── */
  .disclaimer {
    background: #fffbeb;
    border: 1px solid #fde68a;
    border-radius: var(--radius-sm);
    padding: 0.9rem 1rem;
    display: flex;
    gap: 0.6rem;
    align-items: flex-start;
  }
  .disclaimer-icon { font-size: 1rem; flex-shrink: 0; margin-top: 0.05rem; }
  .disclaimer p { font-size: 0.72rem; color: #92400e; line-height: 1.5; }
  .disclaimer strong { color: #78350f; }

  /* ── LOADING / ERROR ── */
  .state-box {
    background: var(--surface);
    border-radius: var(--radius);
    padding: 2.5rem 1.25rem;
    text-align: center;
    border: 1px solid var(--border);
    box-shadow: var(--shadow);
  }
  .state-box .state-icon { font-size: 2.5rem; margin-bottom: 0.75rem; }
  .state-box h3 { font-size: 1rem; font-weight: 700; margin-bottom: 0.4rem; }
  .state-box p { font-size: 0.8rem; color: var(--text2); line-height: 1.5; }
  .btn-primary {
    margin-top: 1rem;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 10px;
    padding: 0.65rem 1.5rem;
    font-family: inherit;
    font-size: 0.85rem;
    font-weight: 700;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
  }
  .btn-primary:active { transform: scale(0.97); }
  .btn-primary:hover { background: #25672f; }

  /* loading spinner */
  .spinner {
    width: 36px; height: 36px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 1rem;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── FOOTER ── */
  footer {
    text-align: center;
    padding: 1rem 1.25rem 0;
    font-size: 0.68rem;
    color: var(--text3);
    line-height: 1.6;
  }
  footer a { color: var(--accent); text-decoration: none; }

  /* ── UPDATE TIME ── */
  .update-time {
    text-align: right;
    font-size: 0.65rem;
    color: var(--text3);
    margin-top: 0.4rem;
  }
</style>
</head>
<body>

<header>
  <div class="header-top">
    <div class="logo-icon">🌿</div>
    <div class="header-text">
      <h1>PAWARTA SEHAT</h1>
      <p>Informasi Kesehatan Berbasis Cuaca</p>
    </div>
  </div>
  <div class="location-bar">
    <span id="locationText">📍 Mendeteksi lokasi...</span>
    <button class="btn-locate" onclick="initApp()">Perbarui</button>
  </div>
</header>

<main id="mainContent">
  <div class="state-box" id="loadingBox">
    <div class="spinner"></div>
    <h3>Sedang memuat data cuaca...</h3>
    <p>Mohon izinkan akses lokasi jika diminta browser kamu</p>
  </div>
</main>

<footer>
  Sumber acuan: Kemenkes RI · BMKG · Jurnal Ekologi Kesehatan Litbang Kemkes<br>
  Data cuaca: <a href="https://openweathermap.org" target="_blank">OpenWeatherMap</a>
</footer>

<script>
// ═══════════════════════════════════════════════════
// KONFIGURASI
// ═══════════════════════════════════════════════════
const OWM_KEY = 'cce21d94dcda6c7df00422619229a5f8'; // ganti dengan API key OWM kamu

// ═══════════════════════════════════════════════════
// DATABASE PENYAKIT & THRESHOLD CUACA
// Sumber: Kemenkes RI, Jurnal Ekologi Kesehatan, P2PM
// ═══════════════════════════════════════════════════
const DISEASES = [
  {
    id: 'dbd',
    name: 'Demam Berdarah (DBD)',
    icon: '🦟',
    season: 'Musim hujan & kemarau panas',
    trigger: (w) => {
      // Risiko tinggi: suhu 25-30°C + kelembaban >60% + ada hujan
      // Sumber: Kemenkes P2PM, IJERPH 2022
      const t = w.temp, h = w.humidity, r = w.rain;
      if (t >= 25 && t <= 32 && h >= 70 && r > 0) return 'high';
      if (t >= 24 && t <= 33 && h >= 60) return 'med';
      if (t >= 22 && t <= 35) return 'low';
      return null;
    },
    triggerDesc: (w) => {
      const t = w.temp, h = w.humidity;
      if (t >= 25 && t <= 32 && h >= 70)
        return `Suhu ${t}°C + kelembaban ${h}% — kondisi ideal untuk perkembangbiakan nyamuk <i>Aedes aegypti</i>.`;
      if (t >= 24 && h >= 60)
        return `Suhu hangat ${t}°C dan kelembaban ${h}% mendukung siklus hidup nyamuk DBD.`;
      return `Suhu ${t}°C termasuk dalam rentang aktif nyamuk DBD.`;
    },
    prevention: [
      '3M Plus: Menguras, Menutup, Mendaur ulang tempat penampungan air',
      'Pasang kawat nyamuk di ventilasi rumah',
      'Gunakan lotion atau pakaian panjang saat subuh & petang',
      'Pantau jentik nyamuk 1x seminggu (gerakan 1 rumah 1 jumantik)',
      'Segera ke Puskesmas jika demam ≥38°C selama 2–7 hari',
    ]
  },
  {
    id: 'ispa',
    name: 'ISPA & Flu',
    icon: '🤧',
    season: 'Pancaroba & musim hujan',
    trigger: (w) => {
      // Risiko tinggi: suhu berfluktuasi / <25°C malam, kelembaban tinggi
      // Sumber: Umsida 2024, Kemenkes
      const t = w.temp, h = w.humidity;
      if (t < 23 && h > 80) return 'high';
      if (t < 25 && h > 70) return 'med';
      if (t < 27 || h > 65) return 'low';
      return null;
    },
    triggerDesc: (w) => {
      const t = w.temp, h = w.humidity;
      if (t < 23)
        return `Suhu ${t}°C yang lebih dingin dari normal dapat melemahkan respons imun tubuh dan memudahkan virus flu berkembang.`;
      return `Kelembaban ${h}% yang tinggi mempermudah penyebaran droplet virus pernapasan.`;
    },
    prevention: [
      'Kenakan jaket atau pakaian hangat terutama pagi dan malam hari',
      'Cuci tangan dengan sabun sebelum makan dan setelah beraktivitas',
      'Hindari kontak dekat dengan orang yang sedang flu/batuk',
      'Konsumsi makanan bergizi dan istirahat cukup agar imun terjaga',
      'Gunakan masker di keramaian saat kondisi cuaca tidak menentu',
    ]
  },
  {
    id: 'leptospirosis',
    name: 'Leptospirosis',
    icon: '🐀',
    season: 'Musim hujan & banjir',
    trigger: (w) => {
      // Risiko tinggi: curah hujan tinggi (potensi banjir/genangan)
      // Sumber: Kemenkes, WHO Indonesia, Jateng kasus tertinggi
      const r = w.rain, h = w.humidity;
      if (r > 20 || w.weatherMain === 'Thunderstorm') return 'high';
      if (r > 5 || h > 85) return 'med';
      if (r > 0 || h > 75) return 'low';
      return null;
    },
    triggerDesc: (w) => {
      if (w.rain > 20)
        return `Curah hujan tinggi (${w.rain} mm) berpotensi membuat genangan air yang terkontaminasi bakteri Leptospira dari urin tikus.`;
      if (w.rain > 0)
        return `Kondisi hujan meningkatkan risiko paparan air tergenang yang bisa mengandung bakteri Leptospira.`;
      return `Kelembaban tinggi ${w.humidity}% menunjukkan kondisi lembab yang mendukung bertahannya bakteri Leptospira.`;
    },
    prevention: [
      'Pakai sepatu bot atau sandal saat berjalan di genangan air/banjir',
      'Cuci luka atau goresan dengan air bersih jika terkena genangan',
      'Simpan makanan dalam wadah tertutup agar tidak dijangkau tikus',
      'Laporkan ke Puskesmas jika muncul nyeri betis + demam pasca banjir',
      'Jaga kebersihan lingkungan, basmi sarang tikus di sekitar rumah',
    ]
  },
  {
    id: 'diare',
    name: 'Diare & Penyakit Pencernaan',
    icon: '🦠',
    season: 'Musim hujan (banjir) & kemarau panas',
    trigger: (w) => {
      // Sumber: Jurnal Ekologi Kesehatan Litbang Kemkes (Denpasar),
      // hubungan signifikan curah hujan + kelembaban dengan diare (lag 1 minggu)
      const r = w.rain, t = w.temp, h = w.humidity;
      if (r > 15 || t > 34) return 'high';
      if (r > 5 || t > 31 || h > 80) return 'med';
      if (r > 0 || t > 29) return 'low';
      return null;
    },
    triggerDesc: (w) => {
      if (w.rain > 15)
        return `Hujan deras (${w.rain} mm) bisa mencemari sumber air minum — bakteri penyebab diare lebih mudah berkembang.`;
      if (w.temp > 34)
        return `Suhu panas ${w.temp}°C mempercepat pertumbuhan bakteri dalam makanan yang tidak disimpan dengan baik.`;
      return `Kombinasi cuaca saat ini meningkatkan risiko kontaminasi makanan dan minuman.`;
    },
    prevention: [
      'Selalu minum air yang sudah dimasak atau air kemasan terpercaya',
      'Cuci tangan pakai sabun sebelum makan dan setelah dari toilet',
      'Pastikan makanan dimasak matang dan tidak dibiarkan terlalu lama',
      'Hindari jajan makanan/minuman yang kebersihannya diragukan',
      'Beri oralit segera jika ada anggota keluarga (terutama anak) yang diare',
    ]
  },
  {
    id: 'heatstroke',
    name: 'Heat Stroke & Dehidrasi',
    icon: '🌡️',
    season: 'Puncak musim kemarau',
    trigger: (w) => {
      const t = w.temp, h = w.humidity;
      if (t > 36) return 'high';
      if (t > 33 || (t > 30 && h < 40)) return 'med';
      if (t > 31) return 'low';
      return null;
    },
    triggerDesc: (w) => {
      if (w.temp > 36)
        return `Suhu ekstrem ${w.temp}°C sangat berisiko menyebabkan heat stroke, terutama bagi lansia dan anak-anak.`;
      return `Suhu ${w.temp}°C yang tinggi mempercepat kehilangan cairan tubuh — dehidrasi bisa terjadi lebih cepat dari biasanya.`;
    },
    prevention: [
      'Minum air putih minimal 8 gelas/hari, jangan tunggu haus',
      'Hindari aktivitas berat di luar ruangan pukul 10.00–15.00',
      'Kenakan pakaian longgar, berwarna terang, dan topi/payung',
      'Segera cari tempat teduh & minum air jika pusing/lemas di luar',
      'Perhatikan kondisi lansia dan anak kecil — lebih rentan kepanasan',
    ]
  },
];

// ═══════════════════════════════════════════════════
// HELPER: OVERALL RISK LEVEL
// ═══════════════════════════════════════════════════
function getOverallRisk(results) {
  if (results.some(r => r.risk === 'high')) return 'high';
  if (results.some(r => r.risk === 'med')) return 'med';
  if (results.some(r => r.risk === 'low')) return 'low';
  return 'low';
}

const RISK_INFO = {
  low:  { emoji: '😊', label: 'Risiko Rendah', desc: 'Kondisi cuaca relatif aman. Tetap jaga kebersihan dan pola hidup sehat ya.' },
  med:  { emoji: '⚠️', label: 'Risiko Sedang', desc: 'Beberapa penyakit musiman mulai perlu diwaspadai. Perkuat imun dan kebersihan.' },
  high: { emoji: '🚨', label: 'Risiko Tinggi', desc: 'Kondisi cuaca mendukung penyebaran penyakit. Terapkan langkah pencegahan segera!' },
};

// ═══════════════════════════════════════════════════
// HELPER: WEATHER ICON & DESC
// ═══════════════════════════════════════════════════
function weatherIcon(main) {
  const map = {
    Clear: '☀️', Clouds: '⛅', Rain: '🌧️',
    Drizzle: '🌦️', Thunderstorm: '⛈️', Mist: '🌫️',
    Fog: '🌫️', Haze: '🌫️', Snow: '❄️',
  };
  return map[main] || '🌤️';
}

function weatherDesc(main, desc) {
  const map = {
    Clear: 'Cerah', Clouds: 'Berawan', Rain: 'Hujan',
    Drizzle: 'Gerimis', Thunderstorm: 'Hujan lebat disertai petir',
    Mist: 'Berkabut', Fog: 'Berkabut tebal', Haze: 'Berselimut kabut',
  };
  return map[main] || desc;
}

function humidityDesc(h) {
  if (h > 85) return 'Sangat lembab';
  if (h > 70) return 'Lembab';
  if (h > 55) return 'Normal';
  return 'Kering';
}

function tempDesc(t) {
  if (t > 35) return 'Sangat panas';
  if (t > 32) return 'Panas';
  if (t > 28) return 'Hangat';
  if (t > 24) return 'Sejuk';
  return 'Dingin';
}

// ═══════════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════════
function renderApp(weather, locationName) {
  // evaluate all diseases
  const results = DISEASES
    .map(d => ({ ...d, risk: d.trigger(weather) }))
    .filter(d => d.risk !== null)
    .sort((a, b) => {
      const order = { high: 0, med: 1, low: 2 };
      return order[a.risk] - order[b.risk];
    });

  const overall = getOverallRisk(results);
  const ri = RISK_INFO[overall];
  const now = new Date().toLocaleString('id-ID', { dateStyle: 'medium', timeStyle: 'short' });

  const html = `
    <!-- WEATHER CARD -->
    <div class="weather-card">
      <div class="weather-card-header">📡 Kondisi Cuaca Saat Ini</div>
      <div class="weather-grid">
        <div class="weather-param weather-condition">
          <span class="condition-icon">${weatherIcon(weather.weatherMain)}</span>
          <div class="condition-text">
            <div class="main">${weatherDesc(weather.weatherMain, weather.weatherDesc)}</div>
            <div class="sub">${weather.weatherDesc}</div>
          </div>
        </div>
        <div class="weather-param">
          <div class="param-label">🌡️ Suhu</div>
          <div class="param-value">${weather.temp}<span>°C</span></div>
          <div class="param-desc">${tempDesc(weather.temp)}</div>
        </div>
        <div class="weather-param">
          <div class="param-label">💧 Kelembaban</div>
          <div class="param-value">${weather.humidity}<span>%</span></div>
          <div class="param-desc">${humidityDesc(weather.humidity)}</div>
        </div>
        ${weather.rain > 0 ? `
        <div class="weather-param">
          <div class="param-label">🌧️ Curah Hujan</div>
          <div class="param-value">${weather.rain}<span>mm</span></div>
          <div class="param-desc">Per jam terakhir</div>
        </div>` : ''}
        <div class="weather-param">
          <div class="param-label">💨 Angin</div>
          <div class="param-value">${weather.wind}<span>km/h</span></div>
          <div class="param-desc">${weather.wind > 30 ? 'Kencang' : weather.wind > 15 ? 'Sedang' : 'Sepoi'}</div>
        </div>
      </div>
      <div class="update-time">Diperbarui: ${now}</div>
    </div>

    <!-- RISK BANNER -->
    <div>
      <div class="section-title">🏥 Status Risiko Kesehatan</div>
      <div class="risk-banner ${overall}">
        <div class="risk-emoji">${ri.emoji}</div>
        <div>
          <div class="risk-label">${ri.label}</div>
          <div class="risk-desc">${ri.desc}</div>
        </div>
      </div>
    </div>

    <!-- DISEASE LIST -->
    ${results.length > 0 ? `
    <div>
      <div class="section-title">🔍 Penyakit yang Perlu Diwaspadai</div>
      <div class="disease-list">
        ${results.map(d => `
          <div class="disease-card" id="card-${d.id}">
            <div class="disease-card-header" onclick="toggleCard('${d.id}')">
              <span class="disease-icon">${d.icon}</span>
              <span class="disease-name">${d.name}</span>
              <span class="disease-risk-pill pill-${d.risk}">
                ${d.risk === 'high' ? 'Tinggi' : d.risk === 'med' ? 'Sedang' : 'Rendah'}
              </span>
              <span class="disease-chevron">▼</span>
            </div>
            <div class="disease-body">
              <div class="disease-trigger">
                <strong>Kenapa sekarang?</strong><br>
                ${d.triggerDesc(weather)}
              </div>
              <div class="prevention-list">
                ${d.prevention.map(p => `<div class="prevention-item">${p}</div>`).join('')}
              </div>
            </div>
          </div>
        `).join('')}
      </div>
    </div>` : `
    <div class="state-box">
      <div class="state-icon">✅</div>
      <h3>Kondisi aman</h3>
      <p>Tidak ada penyakit musiman yang perlu diwaspadai secara khusus saat ini. Tetap jaga pola hidup sehat!</p>
    </div>`}

    <!-- DISCLAIMER -->
    <div class="disclaimer">
      <span class="disclaimer-icon">⚠️</span>
      <p><strong>Perhatian:</strong> Informasi ini bersifat <strong>indikatif</strong> berdasarkan kondisi cuaca. Bukan diagnosis medis. Jika mengalami gejala penyakit, segera konsultasikan ke <strong>Puskesmas atau tenaga kesehatan terdekat</strong>. Data cuaca diambil otomatis berdasarkan lokasi GPS perangkatmu.</p>
    </div>
  `;

  document.getElementById('mainContent').innerHTML = html;
}

function toggleCard(id) {
  const card = document.getElementById('card-' + id);
  card.classList.toggle('open');
}

// ═══════════════════════════════════════════════════
// DATA FETCHING
// ═══════════════════════════════════════════════════
async function fetchWeather(lat, lon) {
  const url = `https://api.openweathermap.org/data/2.5/weather?lat=${lat}&lon=${lon}&appid=${OWM_KEY}&units=metric&lang=id`;
  const res = await fetch(url);
  if (!res.ok) throw new Error('Gagal mengambil data cuaca');
  const data = await res.json();

  return {
    temp: Math.round(data.main.temp),
    humidity: data.main.humidity,
    rain: data.rain ? Math.round((data.rain['1h'] || data.rain['3h'] || 0) * 10) / 10 : 0,
    wind: Math.round(data.wind.speed * 3.6),
    weatherMain: data.weather[0].main,
    weatherDesc: data.weather[0].description,
    city: data.name,
  };
}

async function reverseGeocode(lat, lon) {
  try {
    const url = `https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json`;
    const res = await fetch(url);
    const data = await res.json();
    const addr = data.address;
    const parts = [
      addr.village || addr.suburb || addr.town,
      addr.city || addr.regency || addr.county,
    ].filter(Boolean);
    return parts.join(', ') || data.display_name.split(',')[0];
  } catch {
    return null;
  }
}

// ═══════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════
async function initApp() {
  document.getElementById('mainContent').innerHTML = `
    <div class="state-box" id="loadingBox">
      <div class="spinner"></div>
      <h3>Sedang memuat data cuaca...</h3>
      <p>Mohon izinkan akses lokasi jika diminta browser</p>
    </div>`;
  document.getElementById('locationText').textContent = '📍 Mendeteksi lokasi...';

  if (!navigator.geolocation) {
    showError('Browser tidak mendukung deteksi lokasi. Coba buka di Chrome atau Firefox.');
    return;
  }

  navigator.geolocation.getCurrentPosition(
    async (pos) => {
      const { latitude: lat, longitude: lon } = pos.coords;
      try {
        const [weather, locationName] = await Promise.all([
          fetchWeather(lat, lon),
          reverseGeocode(lat, lon),
        ]);
        const displayLoc = locationName || weather.city || `${lat.toFixed(3)}, ${lon.toFixed(3)}`;
        document.getElementById('locationText').textContent = `📍 ${displayLoc}`;
        renderApp(weather, displayLoc);
      } catch (err) {
        showError('Gagal mengambil data cuaca. Pastikan kamu terhubung ke internet dan API key sudah diisi.');
      }
    },
    (err) => {
      let msg = 'Tidak dapat mendeteksi lokasi.';
      if (err.code === 1) msg = 'Izin lokasi ditolak. Silakan izinkan akses lokasi di pengaturan browser, lalu tekan Perbarui.';
      if (err.code === 2) msg = 'Lokasi tidak tersedia. Pastikan GPS aktif di perangkatmu.';
      if (err.code === 3) msg = 'Deteksi lokasi terlalu lama. Pastikan GPS aktif, lalu coba lagi.';
      showError(msg);
    },
    { timeout: 12000, enableHighAccuracy: true }
  );
}

function showError(msg) {
  document.getElementById('locationText').textContent = '📍 Lokasi tidak terdeteksi';
  document.getElementById('mainContent').innerHTML = `
    <div class="state-box">
      <div class="state-icon">😔</div>
      <h3>Terjadi Kendala</h3>
      <p>${msg}</p>
      <button class="btn-primary" onclick="initApp()">🔄 Coba Lagi</button>
    </div>`;
}

// Auto-start
initApp();
</script>
</body>
</html>
